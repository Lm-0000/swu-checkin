name: swu-check scheduled run

on:
  # Run daily at 21:10 Asia/Shanghai (Beijing) time.
  # GitHub cron uses UTC, Beijing = UTC+8 → 21:10 CST = 13:10 UTC
  schedule:
    - cron: '10 13 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (if present)
        # installs dependencies from repository root requirements.txt if present
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: List all files in repository
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Root directory contents ==="
          ls -la
          echo "=== Recursive find of all .py files ==="
          find . -name "*.py"
          echo "=== Check if scripts/ exists and its contents ==="
          if [ -d "scripts" ]; then ls -la scripts/; else echo "scripts/ not found"; fi
    
      - name: Run scripts/main.py
        env:
          TZ: Asia/Shanghai
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: |
          python -u scripts/main.py
