# 工作流的名称（在 GitHub Actions 页面显示）
name: swu-check scheduled run

# 触发工作流运行的条件
on:
  # 定时触发：使用 cron 语法，这里表示每天 UTC 时间 13:10 运行（北京时间 21:10）
  schedule:
    - cron: '10 13 * * *'
  # 手动触发：允许你在 GitHub 网页上点击按钮运行
  workflow_dispatch:

# 工作流要执行的任务（一个或多个 job）
jobs:
  # 定义一个名为 run-scripts 的任务
  run-scripts:
    # 运行环境：使用最新的 Ubuntu
    runs-on: ubuntu-latest

    # 任务包含的步骤
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 步骤3：安装依赖（如果存在 requirements.txt）
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 步骤4：执行打卡脚本
      - name: Run main.py
        env:
          TZ: Asia/Shanghai                     # 设置时区
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}   # 从仓库 Secrets 中读取学号
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}   # 从仓库 Secrets 中读取密码
        run: python main.py
